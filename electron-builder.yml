appId: com.kwasik.launcher
productName: KwasikLauncher
directories:
  buildResources: build
files:
  - "**/*"
  - "!**/*.{ts,tsx}"
  - "!**/tsconfig.*"
  - "!**/eslint.*"
  - "!**/prettier.*"
  - "!**/dev-app-update.yml"
win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: KwasikLauncher
nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
